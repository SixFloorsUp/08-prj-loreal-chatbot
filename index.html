<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Assistant</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <button
          id="themeToggle"
          class="theme-toggle"
          aria-label="Toggle dark mode"
        >
          <span class="material-icons">dark_mode</span>
        </button>
        <img src="img/loreal-logo.png" alt="L'Oreal Logo" class="site-logo" />
        <h1 class="site-title">Smart Product Advisor</h1>
      </header>

      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <div id="chatWindow" class="chat-window">
            <!-- messages will be appended here via JS -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2026 L'Oréal. All rights reserved.</p>
        <nav>
          <!-- Replace the href URLs below with your actual links -->
          <a href="https://www.loreal.com/en/group/global-privacy-policy/" target="_blank">Privacy Policy</a>
          <a href="https://www.loreal.com/en/group/global-terms-of-use/" target="_blank">Terms of Use</a>
          <a href="https://www.loreal.com/en/usa/articles/contact-us/" target="_blank">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- secrets.js removed - API key is now securely stored in Cloudflare Worker -->
    <script src="script.js"></script>
  </body>
</html>
